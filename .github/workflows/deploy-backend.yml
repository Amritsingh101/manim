name: Deploy Backend to Google Cloud Run

on:
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }} # GCP project ID
  REGION: ${{ secrets.GCP_REGION || 'us-central1' }} # GCP region (e.g. us-central1)
  SERVICE_NAME: ${{ secrets.GCP_SERVICE_NAME || 'manimai-backend' }} # Cloud Run Service Name
  ARTIFACT_REGISTRY_REPO: ${{ secrets.GCP_ARTIFACT_REGISTRY_REPO || 'manimai-repo' }} # Artifact Registry Repository Name

jobs:
  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Google Cloud CLI / Authentication
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          
          # Build from the backend directory
          docker build -t $IMAGE_TAG ./backend
          docker push $IMAGE_TAG
          
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_TAG }}
          flags: |
            --memory=1Gi
            --cpu=1
            --allow-unauthenticated
            --set-env-vars=CELERY_ENABLED=false
