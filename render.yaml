services:
  # ── FastAPI Web Service ───────────────────────────────────────────────────────
  - type: web
    name: manimai-api
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "8000"
      
      # Model configurations (matching your local .env values)
      - key: LIGHT_LLM_MODEL
        value: "gemini-3.1-flash-lite"
      - key: LIGHT_LLM_TEMPERATURE
        value: "0.4"
      - key: LIGHT_LLM_MAX_TOKENS
        value: "12092"
      - key: HEAVY_LLM_MODEL
        value: "gemini-3.5-flash"
      - key: HEAVY_LLM_TEMPERATURE
        value: "0.2"
      - key: HEAVY_LLM_MAX_TOKENS
        value: "20536"

      # Secrets to be entered during initial setup on the Render Dashboard
      - key: DATABASE_URL
        sync: false
      - key: SYNC_DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false

  # ── Celery Rendering Worker ───────────────────────────────────────────────────
  - type: worker
    name: manimai-worker
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    dockerCommand: celery -A app.workers.celery_app worker --loglevel=info
    envVars:
      # Link worker env vars to the API service env vars to avoid typing them twice
      - key: DATABASE_URL
        fromService:
          type: web
          name: manimai-api
          envVarKey: DATABASE_URL
      - key: SYNC_DATABASE_URL
        fromService:
          type: web
          name: manimai-api
          envVarKey: SYNC_DATABASE_URL
      - key: REDIS_URL
        fromService:
          type: web
          name: manimai-api
          envVarKey: REDIS_URL
      - key: CELERY_BROKER_URL
        fromService:
          type: web
          name: manimai-api
          envVarKey: CELERY_BROKER_URL
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: web
          name: manimai-api
          envVarKey: CELERY_RESULT_BACKEND
      - key: GEMINI_API_KEY
        fromService:
          type: web
          name: manimai-api
          envVarKey: GEMINI_API_KEY
      - key: SUPABASE_URL
        fromService:
          type: web
          name: manimai-api
          envVarKey: SUPABASE_URL
      - key: SUPABASE_ANON_KEY
        fromService:
          type: web
          name: manimai-api
          envVarKey: SUPABASE_ANON_KEY
      - key: SUPABASE_JWT_SECRET
        fromService:
          type: web
          name: manimai-api
          envVarKey: SUPABASE_JWT_SECRET
      - key: CLOUDINARY_CLOUD_NAME
        fromService:
          type: web
          name: manimai-api
          envVarKey: CLOUDINARY_CLOUD_NAME
      - key: CLOUDINARY_API_KEY
        fromService:
          type: web
          name: manimai-api
          envVarKey: CLOUDINARY_API_KEY
      - key: CLOUDINARY_API_SECRET
        fromService:
          type: web
          name: manimai-api
          envVarKey: CLOUDINARY_API_SECRET
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: manimai-api
          envVarKey: CORS_ORIGINS
      
      # Link model configs
      - key: LIGHT_LLM_MODEL
        fromService:
          type: web
          name: manimai-api
          envVarKey: LIGHT_LLM_MODEL
      - key: LIGHT_LLM_TEMPERATURE
        fromService:
          type: web
          name: manimai-api
          envVarKey: LIGHT_LLM_TEMPERATURE
      - key: LIGHT_LLM_MAX_TOKENS
        fromService:
          type: web
          name: manimai-api
          envVarKey: LIGHT_LLM_MAX_TOKENS
      - key: HEAVY_LLM_MODEL
        fromService:
          type: web
          name: manimai-api
          envVarKey: HEAVY_LLM_MODEL
      - key: HEAVY_LLM_TEMPERATURE
        fromService:
          type: web
          name: manimai-api
          envVarKey: HEAVY_LLM_TEMPERATURE
      - key: HEAVY_LLM_MAX_TOKENS
        fromService:
          type: web
          name: manimai-api
          envVarKey: HEAVY_LLM_MAX_TOKENS
