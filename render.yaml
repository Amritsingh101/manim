services:
  # ── FastAPI Web Service ───────────────────────────────────────────────────────
  - type: web
    name: manimai-api
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:

      - key: PORT
        value: "8000"
      - fromGroup: manimai-secrets

  # ── Celery Rendering Worker ───────────────────────────────────────────────────
  - type: worker
    name: manimai-worker
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    # Correct override key for Docker services
    dockerCommand: celery -A app.workers.celery_app worker --loglevel=info
    envVars:
      - fromGroup: manimai-secrets

# ── Shared Environment Variables Group ─────────────────────────────────────────
envVarGroups:
  - name: manimai-secrets
    envVars:
      - key: DATABASE_URL
        value: "postgresql+asyncpg://postgres:postgres@localhost:5432/postgres"
      - key: SYNC_DATABASE_URL
        value: "postgresql+psycopg2://postgres:postgres@localhost:5432/postgres"
      - key: REDIS_URL
        value: "rediss://default:password@localhost:6379"
      - key: CELERY_BROKER_URL
        value: "rediss://default:password@localhost:6379"
      - key: CELERY_RESULT_BACKEND
        value: "rediss://default:password@localhost:6379"
      - key: GEMINI_API_KEY
        value: "your-gemini-api-key"
      - key: SUPABASE_URL
        value: "https://your-supabase.supabase.co"
      - key: SUPABASE_ANON_KEY
        value: "your-anon-key"
      - key: SUPABASE_JWT_SECRET
        value: "your-jwt-secret"
      - key: CLOUDINARY_CLOUD_NAME
        value: "your-cloudinary-name"
      - key: CLOUDINARY_API_KEY
        value: "your-cloudinary-key"
      - key: CLOUDINARY_API_SECRET
        value: "your-cloudinary-secret"
      - key: CORS_ORIGINS
        value: "http://localhost:5173,https://your-frontend.onrender.com"
