services:
  # ── FastAPI Web Service & Celery Worker (Combined) ──────────────────────────
  - type: web
    name: manimai-api
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: PORT
        value: "8000"
      
      # Model configurations
      - key: LIGHT_LLM_MODEL
        value: "gemini-3.1-flash-lite"
      - key: LIGHT_LLM_TEMPERATURE
        value: "0.4"
      - key: LIGHT_LLM_MAX_TOKENS
        value: "12092"
      - key: HEAVY_LLM_MODEL
        value: "gemini-3.5-flash"
      - key: HEAVY_LLM_TEMPERATURE
        value: "0.2"
      - key: HEAVY_LLM_MAX_TOKENS
        value: "20536"

      # Secrets to be entered during initial setup on the Render Dashboard
      - key: DATABASE_URL
        sync: false
      - key: SYNC_DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
